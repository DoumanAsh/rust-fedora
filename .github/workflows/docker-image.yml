name: Docker

on:
  # Once a week
  schedule:
    - cron: '0 0 * * 0'
  push:
    paths:
      - '.github/workflows/docker-image.yml'
      - 'Dockerfile.*'
      - 'root/**/*'
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - '**'
    paths:
      - '.github/workflows/docker-image.yml'
      - 'Dockerfile.*'
      - 'root/**/*'

env:
  LATEST_FEDORA_VER: 43
  DOCKER_REGISTRY: docker.io
  GITHUB_REGISTRY: ghcr.io
  DOCKER_IMAGE_NAME: douman/rust-fedora
  GITHUB_IMAGE_NAME: doumanash/rust-fedora

jobs:
  build-latest:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        build-type: ["native", "rustup"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine build args
        id: determine_type
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: |
          if [[ "$BUILD_TYPE" == "native" ]]; then
              echo "::notice ::Native package"
              echo "tag_suffix=" >> "$GITHUB_OUTPUT"
              echo "install_type=native" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_TYPE" == "rustup" ]]; then
              echo "::notice ::Rustup package"
              echo "tag_suffix=rustup-" >> "$GITHUB_OUTPUT"
              echo "install_type=rustup" >> "$GITHUB_OUTPUT"
          else
              echo "::warn ::Invalid BUILD_TYPE=$BUILD_TYPE"
              exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log into ${{ env.DOCKER_REGISTRY }} registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: douman
          ## Set in repo Settings->Secrets->New repository secret
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log into ${{ env.GITHUB_REGISTRY }} registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        id: build-docker
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.${{ env.LATEST_FEDORA_VER }}
          build-args: "INSTALLATION_TYPE=${{steps.determine_type.outputs.install_type}}"
          context: .
          platforms: linux/amd64
          load: true
          tags: |
            ${{env.DOCKER_REGISTRY}}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}latest
            ${{env.GITHUB_REGISTRY}}/${{ env.GITHUB_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}latest

      - name: Test version
        id: test
        run: |
          VERSION=$(docker run --rm ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}latest rustc --version | cut -d" " -f2)
          echo "::notice ::Rust version $VERSION"
          echo "rustc_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push Docker image
        id: push-docker
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: "INSTALLATION_TYPE=${{steps.determine_type.outputs.install_type}}"
          file: Dockerfile.${{ env.LATEST_FEDORA_VER }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}fedora${{env.LATEST_FEDORA_VER}}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.test.outputs.rustc_version }}-${{ steps.determine_type.outputs.tag_suffix }}fedora${{env.LATEST_FEDORA_VER}}
            ${{ env.GITHUB_REGISTRY }}/${{ env.GITHUB_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}latest
            ${{ env.GITHUB_REGISTRY }}/${{ env.GITHUB_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}fedora${{env.LATEST_FEDORA_VER}}
            ${{ env.GITHUB_REGISTRY }}/${{ env.GITHUB_IMAGE_NAME }}:${{ steps.test.outputs.rustc_version }}-${{ steps.determine_type.outputs.tag_suffix }}fedora${{env.LATEST_FEDORA_VER}}

  build-version:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        fedora: [42, 44, rawhide]
        build-type: ["native", "rustup"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine build args
        id: determine_type
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: |
          if [[ "$BUILD_TYPE" == "native" ]]; then
              echo "::notice ::Native package"
              echo "tag_suffix=" >> "$GITHUB_OUTPUT"
              echo "install_type=native" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_TYPE" == "rustup" ]]; then
              echo "::notice ::Rustup package"
              echo "tag_suffix=rustup-" >> "$GITHUB_OUTPUT"
              echo "install_type=rustup" >> "$GITHUB_OUTPUT"
          else
              echo "::warn ::Invalid BUILD_TYPE=$BUILD_TYPE"
              exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log into ${{ env.DOCKER_REGISTRY }} registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: douman
          ## Set in repo Settings->Secrets->New repository secret
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log into ${{ env.GITHUB_REGISTRY }} registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        id: build-docker
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: "INSTALLATION_TYPE=${{steps.determine_type.outputs.install_type}}"
          file: Dockerfile.${{ matrix.fedora }}
          platforms: linux/amd64
          load: true
          tags: |
            ${{env.DOCKER_REGISTRY}}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}fedora${{ matrix.fedora }}
            ${{env.GITHUB_REGISTRY}}/${{ env.GITHUB_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}fedora${{ matrix.fedora }}

      - name: Test version
        id: test
        run: |
          VERSION=$(docker run --rm ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}fedora${{ matrix.fedora }} rustc --version | cut -d" " -f2)
          echo "::notice ::Rust version $VERSION"
          echo "rustc_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push Docker image
        id: push-docker
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: "INSTALLATION_TYPE=${{steps.determine_type.outputs.install_type}}"
          file: Dockerfile.${{ matrix.fedora }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}fedora${{ matrix.fedora }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.test.outputs.rustc_version }}-${{ steps.determine_type.outputs.tag_suffix }}fedora${{ matrix.fedora }}
            ${{ env.GITHUB_REGISTRY }}/${{ env.GITHUB_IMAGE_NAME }}:${{ steps.determine_type.outputs.tag_suffix }}fedora${{ matrix.fedora }}
            ${{ env.GITHUB_REGISTRY }}/${{ env.GITHUB_IMAGE_NAME }}:${{ steps.test.outputs.rustc_version }}-${{ steps.determine_type.outputs.tag_suffix }}fedora${{ matrix.fedora }}
